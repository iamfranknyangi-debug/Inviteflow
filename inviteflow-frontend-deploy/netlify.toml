[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "build"

[build.environment]
  REACT_APP_API_URL  = "https://inviteflow-3.onrender.com/api"
  GENERATE_SOURCEMAP = "false"
  CI                 = "false"
  NODE_OPTIONS       = "--max-old-space-size=1024"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
